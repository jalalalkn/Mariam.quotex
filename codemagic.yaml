workflows:
  android-debug:
    name: Build Android APK
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build APK
        script: |
          if [ -x ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi
    artifacts:
      - app/build/outputs/**/*.apk
